# =============================================================================
# nginx.domain.conf — HealthStack Pro with custom domain + Let's Encrypt
# Used for EXPOSE_MODE=domain
# Requires: DOMAIN env var set, certbot has already obtained the certificate
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript
                  text/xml application/xml text/javascript;
    gzip_min_length 1024;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream backend {
        server backend:8000;
        keepalive 16;
    }

    # Redirect HTTP → HTTPS (except certbot challenge)
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Frontend SPA
        root /usr/share/nginx/html/app;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Landing page
        location /landing/ {
            alias /usr/share/nginx/html/landing/;
            try_files $uri $uri/ /landing/index.html;
        }

        # API — proxy to FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # Health check — no logs to avoid noise
        location /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # Block external access to metrics
        location /metrics {
            deny all;
            return 403;
        }

        # Block API docs in production
        location ~ ^/(docs|redoc|openapi\.json) {
            deny all;
            return 403;
        }
    }
}
